<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz App</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="background"></div>

    <div class="container">

        <h1>🧠 Interactive Quiz App</h1>

        <div class="top-section">

            <div class="question-counter">
                Question <span id="current-question">1</span> /
                <span id="total-questions">10</span>
            </div>

            <div class="timer-box">
                ⏳ <span id="timer">15</span>s
            </div>

        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="quiz-box" id="quiz-box">

            <h2 id="question">
                Loading question...
            </h2>

            <div class="options" id="options">

            </div>

            <button id="next-btn">
                Next →
            </button>

        </div>

        <div class="result-box hidden" id="result-box">

            <h2>🎉 Quiz Completed</h2>

            <div class="score-card">

                <h3 id="final-score"></h3>

                <h3 id="percentage"></h3>

                <p id="performance"></p>

                <div class="high-score">
                    High Score:
                    <span id="high-score"></span>
                </div>

            </div>

            <button id="restart-btn">
                Restart Quiz
            </button>

        </div>

    </div>

    <script type="module" src="main.js"></script>

</body>

</html>
